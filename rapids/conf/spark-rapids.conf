# RAPIDS Accelerator for Apache Spark — local-mode defaults
# Pass to spark-submit/pyspark with: --properties-file conf/spark-rapids.conf
# (the launcher in activate.sh / run scripts wires the jar + this file for you)

# --- Enable the plugin -------------------------------------------------------
spark.plugins                         com.nvidia.spark.SQLPlugin
spark.rapids.sql.enabled              true

# Print why an operator did NOT run on the GPU (set to ALL for full detail, NONE to silence)
spark.rapids.sql.explain              NOT_ON_GPU

# --- GPU concurrency / memory ------------------------------------------------
# How many tasks share each GPU concurrently. 2 is a sane start for a 32GB card.
spark.rapids.sql.concurrentGpuTasks   2
# Pinned host memory speeds up host<->device copies.
spark.rapids.memory.pinnedPool.size   2G

# --- Spark SQL tuning that helps the GPU -------------------------------------
spark.sql.files.maxPartitionBytes     512m
spark.locality.wait                   0s
spark.sql.adaptive.enabled            true
